<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR Auth — Дашборд</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #2a1f10;
            --accent: #ff7b00;
            --accent-hover: #ff9740;
            --text: #f5f5f5;
            --text-secondary: #b0a090;
            --border: #5c3a10;
            --input-bg: #2a1a0a;
            --danger: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(255, 123, 0, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 140, 20, 0.05) 0%, transparent 60%);
        }

        .header {
            background: rgba(42, 31, 16, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header .logo-text {
            font-size: 22px;
            font-weight: 700;
        }
        .header .logo-text span {
            background: linear-gradient(135deg, var(--accent), #ffb366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-logout {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 20px;
        }

        .user-info {
            text-align: center;
        }

        .user-info h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .user-info .email {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .info-block {
            margin-top: 30px;
            padding: 20px;
            background: var(--input-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .info-block h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .info-block p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .info-block code {
            background: rgba(255, 123, 0, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">WR <span>Auth</span></div>
        <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="avatar" id="avatarLetter">U</div>
            <div class="user-info">
                <h2 id="userName">Пользователь</h2>
                <p class="email" id="userEmail">user@example.com</p>
                <p style="color: var(--accent); font-size: 12px; margin-top: 6px;" id="authMethod"></p>
            </div>

            <div class="info-block">
                <h3>📋 Информация о сессии</h3>
                <p>Сессия активна. Вы вошли в систему.</p>
                <p>Время входа: <code id="loginTime">-</code></p>
            </div>

            <div class="info-block" style="margin-top: 16px;">
                <h3>🔗 Сервисы</h3>
                <p>Добро пожаловать в WR Auth. Здесь будет список твоих подключенных сервисов.</p>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('wr_user') || '{}');

        // Если нет сессии — редирект на логин
        if (!user.email) {
            window.location.href = 'index.html';
        }

        document.getElementById('userName').textContent = user.name || user.email?.split('@')[0] || 'Пользователь';
        document.getElementById('userEmail').textContent = user.email || '—';
        document.getElementById('avatarLetter').textContent = (user.name?.[0] || user.email?.[0] || 'U').toUpperCase();
        document.getElementById('authMethod').textContent = user.method === 'yandex' ? '🔑 Вход через Яндекс' : '📧 Вход по почте';
        document.getElementById('loginTime').textContent = user.loggedAt ? new Date(user.loggedAt).toLocaleString('ru-RU') : '—';

        function logout() {
            localStorage.removeItem('wr_user');
            localStorage.removeItem('wr_oauth_state');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
