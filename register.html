<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR Auth — Регистрация</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #2a1f10;
            --accent: #ff7b00;
            --accent-hover: #ff9740;
            --text: #f5f5f5;
            --text-secondary: #b0a090;
            --border: #5c3a10;
            --input-bg: #2a1a0a;
            --error: #ff4444;
            --success: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(255, 123, 0, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 140, 20, 0.05) 0%, transparent 60%);
        }

        .container { width: 100%; max-width: 420px; padding: 20px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo { text-align: center; margin-bottom: 24px; }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--accent);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
        }

        .logo h1 { font-size: 28px; font-weight: 700; margin-top: 12px; }

        .logo span {
            background: linear-gradient(135deg, var(--accent), #ffb366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 123, 0, 0.15);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255, 123, 0, 0.3);
        }

        .message {
            text-align: center;
            font-size: 14px;
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }

        .message.error { background: rgba(255, 68, 68, 0.1); color: var(--error); display: block; }
        .message.success { background: rgba(76, 175, 80, 0.1); color: var(--success); display: block; }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">WR</div>
                <h1>WR <span>Auth</span></h1>
            </div>
            <p class="subtitle">Создай аккаунт для входа в сервисы</p>

            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="regName" placeholder="Иван" required minlength="2">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 8 символов" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Повторите пароль</label>
                    <input type="password" id="regPasswordConfirm" placeholder="••••••••" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>

            <div class="message" id="regMessage"></div>
            <p class="footer">
                Уже есть аккаунт? <a href="index.html">Войти</a>
            </p>
        </div>
    </div>

    <script>
        function showMessage(text, type) {
            const el = document.getElementById('regMessage');
            el.textContent = text;
            el.className = 'message ' + type;
            setTimeout(() => { el.className = 'message'; }, 4000);
        }

        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;

            if (password !== confirm) {
                showMessage('Пароли не совпадают', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('wr_users') || '[]');
            if (users.find(u => u.email === email)) {
                showMessage('Этот email уже зарегистрирован', 'error');
                return;
            }

            users.push({ name, email, password: btoa(password), createdAt: new Date().toISOString() });
            localStorage.setItem('wr_users', JSON.stringify(users));

            showMessage('Регистрация успешна! Перенаправляем...', 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        }
    </script>
</body>
</html>
